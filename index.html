<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Evolution</title>
    <style>
        body { margin: 0; background: #fdfaf0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { width: 100%; height: 100%; }
        .ui { position: fixed; bottom: 40px; font-family: 'Serif'; color: #4a5d23; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="ui">TAP TO GROW YOUR TREE</div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawTree(x, y, len, angle, branchWidth) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = "#4a2c1d";
            ctx.lineWidth = branchWidth;
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (len < 10) {
                ctx.restore();
                return;
            }

            drawTree(0, -len, len * 0.75, angle - 20, branchWidth * 0.8);
            drawTree(0, -len, len * 0.75, angle + 20, branchWidth * 0.8);
            ctx.restore();
        }

        window.addEventListener('mousedown', (e) => {
            ctx.clearRect(0, 0, width, height);
            drawTree(e.clientX, height, 100, 0, 10);
        });
    </script>
</body>
</html>
